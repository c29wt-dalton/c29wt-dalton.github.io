<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
		<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>

</head>
<body>

	<script>
			let xpos
			let ypos
			let xspeed = 5
			let yspeed = 8
			let d =50
			let fillColor = "blue"
		function setup(){
			createCanvas(800,800)
			xpos = width/2
			ypos = height/2
		}

		function draw(){
			background(200)
			d = getRandomDiameter()
			// if xpos > width or xpos is less than 0
			if (xpos + d/2 > width|| xpos - d/2 <0){
				//reverse
				xspeed *= -1
			}
			if (ypos + d/2>height || ypos - d/2 <0){
				yspeed *=-1
			}


			changeBallcolor("green","purple","yellow", "blue")

			xpos += xspeed
			ypos += yspeed
			fill(fillColor)
			circle(xpos, ypos,d)

		}

		function getRandomDiameter (){
			let randomDiameter = random(30,50)
			return randomDiameter
		}



		function changeBallcolor(topRightColor, bottomRightColor, topLeftColor, bottomLeftColor){
			if (xpos > width/2 && ypos < height/2){
				fillColor = topRightColor

			} else if (xpos < width/2 && ypos > height/2){
				fillColor = bottomRightColor

			} else if (xpos < width/2 && ypos < height/2){
				fillColor = topLeftColor

			} else {
				fillColor = bottomLeftColor
			}
		}
	</script>


</body>
</html>
