<script>
	function setup(){
		createCanvas(800,800);

	}
	
	function draw(){
		background(200)
		push()
		translate(100,100)
		rectMode(CENTER)
		// rotate(PI/8)
		rotate(frameCount * 0.05)
		rect(0,0,100,50)
		pop()

		


		circle(400,400,500)
		
			push()
		translate(400,400)
		rectMode(CENTER)
		// rotate(PI/8)
		rotate(frameCount * 0.05)
		rect(0, 0, 200, 40)
		pop()

		push()
		translate(400,400)
		rectMode(CENTER)
		// rotate(PI/6)
		rotate(frameCount * 0.1)
		rect(0, 0, 120, 40)
		pop()
